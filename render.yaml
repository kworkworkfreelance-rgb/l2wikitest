services:
    - type: web
      name: l2wiki
      runtime: node
      plan: starter
      buildCommand: npm install
      startCommand: npm start
      healthCheckPath: /api/admin/session
      envVars:
          - key: ADMIN_USERNAME
            value: admin
          - key: ADMIN_PASSWORD
            sync: false
          - key: L2WIKI_STORAGE_DIR
            value: /var/data/l2wiki
          - key: L2WIKI_ENABLE_SQLITE_SYNC
            value: "0"
          - key: L2WIKI_ENABLE_STATIC_PUBLISH
            value: "0"
          - key: L2WIKI_ENABLE_BACKUPS
            value: "0"
      disk:
          name: data
          mountPath: /var/data
          sizeGB: 10
