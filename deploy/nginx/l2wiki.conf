# Recommended nginx site config for L2Wiki
# Copy to /etc/nginx/sites-available/l2wiki and enable with symlink

server {
    listen 80;
    listen [::]:80;
    server_name l2wiki.su www.l2wiki.su;

    client_max_body_size 100M;
    access_log /var/log/nginx/l2wiki.access.log;
    error_log /var/log/nginx/l2wiki.error.log;

    # Basic security headers (adjust as needed)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 90;
    }

    # Serve static assets directly when possible
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
